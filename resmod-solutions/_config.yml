# Site Settings
title: "ResMod Solutions"
title_separator: "|"
subtitle: "Subsurface Simulation & Student Training"
description: "Expert modelling for CO₂ storage, H₂ storage, EOR, and reservoir performance. Hands-on open-source training for students."
url: "https://resmod-solutions.com"         # change to your domain
baseurl: ""                                # leave empty if you use a custom domain
repository: "yourusername/resmod-solutions" # GitHub repo

# Author
author:
  name: "Your Name"
  avatar: "/assets/images/your-photo.jpg"
  bio: "Subsurface modelling specialist. Open‑source enthusiast."
  location: "Your City, Country"
  email: "your.email@resmod-solutions.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yourprofile"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yourusername"

# Theme
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"  # clean, modern; other options: "default", "dark", "sunrise"

# Site Settings
locale: "en-US"
logo: "/assets/images/logo.svg"
masthead_title: "ResMod Solutions"
breadcrumbs: true
search: false

# Pagination
paginate: 5
paginate_path: /blog/page:num/

# Plugins (pre-installed on GitHub Pages)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Collections
collections:
  services:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
      share: true
  # _posts
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Footer
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yourprofile"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yourusername"
